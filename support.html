<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteCopy - Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .banner {
      background: linear-gradient(135deg, #1e1e2e, #313244);
      padding: 40px 32px 32px;
      text-align: center;
    }
    .banner-icon { font-size: 48px; margin-bottom: 12px; }
    .banner h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4fc3f7, #a6e3a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .banner p { color: #a6adc8; font-size: 14px; }
    .body { padding: 28px 32px; }
    .body h2 { font-size: 16px; color: #a6e3a1; margin-bottom: 14px; }
    .body ul { list-style: none; padding: 0; margin-bottom: 20px; }
    .body li {
      padding: 6px 0;
      font-size: 14px;
      color: #bac2de;
      border-bottom: 1px solid #1e1e2e;
    }
    .body li:last-child { border-bottom: none; }
    .body li::before { content: '✓ '; color: #a6e3a1; }
    .thank { margin-top: 20px; }
    .thank p { font-size: 14px; color: #bac2de; line-height: 1.7; margin-bottom: 10px; }
    .heart { color: #f38ba8; }
    .cta { text-align: center; padding: 20px 32px 28px; border-top: 1px solid #313244; }
    .cta p { font-size: 13px; color: #6c7086; margin-bottom: 14px; }
    .support-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #4fc3f7, #a6e3a1);
      color: #1e1e2e;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .support-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(79,195,247,0.3);
    }
    .footer {
      padding: 16px 32px;
      text-align: center;
      font-size: 12px;
      color: #6c7086;
      border-top: 1px solid #1e1e2e;
    }
    .footer a { color: #4fc3f7; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="banner">
      <div class="banner-icon">📋</div>
      <h1>LiteCopy</h1>
      <p data-i18n="tagline"></p>
    </div>
    <div class="body">
      <h2 data-i18n="featuresTitle"></h2>
      <ul id="featureList"></ul>
      <h2 data-i18n="thankTitle"></h2>
      <div class="thank" id="thankText"></div>
    </div>
    <div class="cta">
      <p data-i18n="ctaHint"></p>
      <a class="support-btn" href="https://ko-fi.com/annmax?ref=cleancopy" target="_blank" rel="noopener">
        <img src="./assets/coffee.png" alt="" width="28" height="22" style="vertical-align:middle"> <span data-i18n="btnText"></span>
      </a>
    </div>
    <div class="footer">
      <a href="https://github.com/annmax1983/LiteCopy" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp;
      <a href="https://annmax1983.github.io/LiteCopy/privacy-policy.html" target="_blank" rel="noopener" data-i18n="privacyPolicy">Privacy Policy</a>
      &nbsp;·&nbsp; Copyright © 2026 LiteCopy
    </div>
  </div>
  <script>
    const I18N = {
      zh: {
        tagline: '一键解除复制限制 · 轻量 · 隐私',
        featuresTitle: '✨ 功能特色',
        features: ['解除 CSS 禁止选中限制', '解除右键菜单拦截', '解除复制/粘贴快捷键拦截', '清除防盗文本遮罩层', '一键开关，无需刷新页面', '仅需 activeTab 最小权限'],
        thankTitle: '💌 想对你说',
        thank: ['感谢你使用 LiteCopy。做这个工具是因为受够了网页不让复制、不让选中、不让右键的体验。', '如果它也帮到了你，那对我来说就是最好的回报。', '当然，如果你愿意请我喝一杯咖啡 <span class="heart">☕</span>，我会非常开心。'],
        ctaHint: '点击下方按钮，跳转到支持页面',
        btnText: '支持作者',
        privacyPolicy: '隐私条款'
      },
      en: {
        tagline: 'Unlock Copy & Select · Lightweight · Private',
        featuresTitle: '✨ Features',
        features: ['Remove CSS user-select restrictions', 'Unblock right-click context menu', 'Unblock copy/paste keyboard shortcuts', 'Remove text protection overlays', 'One-click toggle, no page refresh needed', 'Only activeTab minimal permission'],
        thankTitle: '💌 A Note to You',
        thank: ['Thank you for using LiteCopy. I built this tool because I was tired of websites that block copying, text selection, and right-click.', 'If it helps you too, that\'s already the best reward I could ask for.', 'Of course, if you\'d like to <span class="heart">☕</span> buy me a coffee, it would truly make my day.'],
        ctaHint: 'Click the button below to visit the support page',
        btnText: 'Support the Developer',
        privacyPolicy: 'Privacy Policy'
      },
      ja: {
        tagline: 'コピー制限を解除 · 軽量 · プライベート',
        featuresTitle: '✨ 機能',
        features: ['CSS user-select制限を解除', '右クリックメニューのブロックを解除', 'コピー/貼り付けショートカットのブロックを解除', 'テキスト保護オーバーレイを除去', 'ワンクリック切替、ページ更新不要', 'activeTabの最小権限のみ'],
        thankTitle: '💌 ご利用ありがとうございます',
        thank: ['LiteCopyをご利用いただきありがとうございます。ウェブサイトのコピー・選択・右クリック制限にうんざりして作りました。', 'もしよろしければ、コーヒーを <span class="heart">☕</span> 一杯おごっていただけると、とても嬉しいです。'],
        ctaHint: '下のボタンをクリックするとサポートページに移動します',
        btnText: '開発者を支援',
        privacyPolicy: 'プライバシーポリシー'
      },
      de: {
        tagline: 'Kopieren entsperren · Leichtgewichtig · Privat',
        featuresTitle: '✨ Funktionen',
        features: ['CSS user-select Beschränkungen entfernen', 'Rechtsklick-Kontextmenü entsperren', 'Kopieren/Einfügen Tastenkürzel entsperren', 'Textschutz-Overlays entfernen', 'Ein-Klick-Umschaltung, kein Seitenneuladen', 'Nur activeTab Mindestberechtigung'],
        thankTitle: '💌 Ein paar Worte an Sie',
        thank: ['Vielen Dank, dass Sie LiteCopy nutzen. Ich habe dieses Tool gebaut, weil ich genug hatte von Websites, die Kopieren, Textauswahl und Rechtsklick blockieren.', 'Wenn Sie mir gerne einen <span class="heart">☕</span> Kaffee ausgeben möchten, würde mich das sehr freuen.'],
        ctaHint: 'Klicken Sie auf die Schaltfläche unten, um zur Support-Seite zu gelangen',
        btnText: 'Entwickler unterstützen',
        privacyPolicy: 'Datenschutzrichtlinie'
      },
      es: {
        tagline: 'Desbloquear Copiar · Ligero · Privado',
        featuresTitle: '✨ Características',
        features: ['Eliminar restricciones CSS user-select', 'Desbloquear menú contextual clic derecho', 'Desbloquear atajos de copiar/pegar', 'Eliminar capas de protección de texto', 'Un clic para activar, sin recargar', 'Solo permiso mínimo activeTab'],
        thankTitle: '💌 Unas palabras para ti',
        thank: ['Gracias por usar LiteCopy. Construí esta herramienta porque estaba harto de sitios que bloquean copiar, seleccionar texto y clic derecho.', 'Por supuesto, si quieres invitarme a un <span class="heart">☕</span> café, me haría muy feliz.'],
        ctaHint: 'Haz clic en el botón de abajo para visitar la página de soporte',
        btnText: 'Apoya al desarrollador',
        privacyPolicy: 'Política de Privacidad'
      },
      fr: {
        tagline: 'Débloquer Copier · Léger · Privé',
        featuresTitle: '✨ Fonctionnalités',
        features: ['Supprimer les restrictions CSS user-select', 'Débloquer le menu contextuel clic droit', 'Débloquer les raccourcis copier/coller', 'Supprimer les couches de protection texte', 'Un clic pour activer, sans recharger', 'Seule permission minimale activeTab'],
        thankTitle: '💌 Un petit mot pour vous',
        thank: ['Merci d\'utiliser LiteCopy. J\'ai construit cet outil parce que j\'en avais assez des sites qui bloquent la copie, la sélection et le clic droit.', 'Bien sûr, si vous souhaitez m\'offrir un <span class="heart">☕</span> café, cela me ferait très plaisir.'],
        ctaHint: 'Cliquez sur le bouton ci-dessous pour accéder à la page de soutien',
        btnText: 'Soutenir le développeur',
        privacyPolicy: 'Politique de Confidentialité'
      }
    };
    function detectLang() {
      const code = (navigator.language || 'en').split('-')[0].toLowerCase();
      return I18N[code] ? code : 'en';
    }
    function applyLang(lang) {
      const t = I18N[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      document.getElementById('featureList').innerHTML = t.features.map(f => `<li>${f}</li>`).join('');
      document.getElementById('thankText').innerHTML = t.thank.map(p => `<p>${p}</p>`).join('');
      document.documentElement.lang = lang;
    }
    applyLang(detectLang());
  </script>
</body>
</html>
